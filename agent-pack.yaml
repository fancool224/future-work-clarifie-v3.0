      面向 HR 管理层的未来工作共创技能。帮助团队围绕某个 HR 相关工作进行结构化拆解，识别工作颗粒度，
      判断问题处理模式、未来执行主体变化、AI价值增益方式和AI能力介入路径，最后提炼出该工作在AI时代的未来命题、
      重构方向和跨角色共创议题。
